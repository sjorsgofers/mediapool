<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MASTERCLASS 2026 – Video App</title>
  <meta name="theme-color" content="#0b0b0b" />
  <style>
    :root {
      --bg: #0b0b0b;
      --card: #141414;
      --card-2: #181818;
      --text: #ffffff;
      --muted: #b7b7b7;
      --gold: #c8a45b;
      --gold-soft: rgba(200,164,91,.18);
      --gold-line: rgba(200,164,91,.38);
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --maxw: 1440px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(200,164,91,.10), transparent 28%),
        linear-gradient(180deg, #111 0%, var(--bg) 22%, #090909 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100%;
    }

    a { color: inherit; text-decoration: none; }

    .app {
      width: 100%;
      min-height: 100dvh;
      padding: clamp(16px, 2vw, 28px);
    }

    .shell {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      margin-bottom: 24px;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(11,11,11,.94), rgba(11,11,11,.78));
      border: 1px solid var(--gold-line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-inner {
      padding: clamp(18px, 3vw, 30px);
      display: grid;
      gap: 18px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--gold-line);
      background: var(--gold-soft);
      color: var(--gold);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 54px);
      line-height: 1.02;
      letter-spacing: -.03em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 18px);
      max-width: 900px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 14px 18px;
      min-height: 56px;
    }

    .search svg {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      opacity: .75;
    }

    .search input {
      appearance: none;
      background: transparent;
      border: 0;
      outline: 0;
      width: 100%;
      color: white;
      font-size: 16px;
    }

    .search input::placeholder { color: #9f9f9f; }

    .count {
      min-width: 130px;
      text-align: center;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: grid;
      grid-template-rows: auto 1fr;
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border: 1px solid var(--gold-line);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      min-width: 0;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(200,164,91,.6);
      box-shadow: 0 18px 44px rgba(0,0,0,.45);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #090909;
      overflow: hidden;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #090909;
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(11,11,11,.85);
      border: 1px solid rgba(255,255,255,.12);
      color: white;
      font-weight: 700;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: -.01em;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      text-align: center;
      border: 1px solid transparent;
      transition: transform .18s ease, opacity .18s ease, border-color .18s ease, background .18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-watch {
      background: var(--gold);
      color: #111;
    }

    .btn-download {
      background: rgba(255,255,255,.06);
      color: white;
      border-color: rgba(255,255,255,.1);
    }

    .btn-disabled {
      background: rgba(255,255,255,.04);
      color: #8f8f8f;
      border-color: rgba(255,255,255,.08);
      cursor: not-allowed;
      pointer-events: none;
    }

    .empty {
      display: none;
      margin-top: 20px;
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--gold-line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
      text-align: center;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 20px;
      color: #9f9f9f;
      font-size: 13px;
      text-align: center;
    }

    @media (min-width: 680px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 1380px) {
      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
      .count {
        width: 100%;
      }
      .actions {
        grid-template-columns: 1fr;
      }
      .hero {
        position: static;
      }
    }
  </style>
</head>
<body>

    <div class="shell">
      <section class="hero">

          <div class="eyebrow">Mediapool</div>
          <div>

              </svg>
              <input id="searchInput" type="search" placeholder="Zoek op titel, bijvoorbeeld 'finale' of 'afro'..." autocomplete="off" />
            </label>
            <div class="count"><span id="visibleCount">0</span> video's</div>
          </div>
        </div>
      </section>

      <section id="videoGrid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty">Geen video's gevonden voor deze zoekopdracht.</div>
      <div class="footer-note">Tip: zet deze pagina op volledig scherm of voeg haar toe aan je beginscherm voor een app-achtig gevoel.</div>
    </div>

    const grid = document.getElementById('videoGrid');
    const searchInput = document.getElementById('searchInput');
    const visibleCount = document.getElementById('visibleCount');
    const emptyState = document.getElementById('emptyState');

    function render(filter = '') {
      const q = filter.trim().toLowerCase();
      const filtered = videos.filter(video => video.title.toLowerCase().includes(q));

      grid.innerHTML = filtered.map((video, index) => {
        const downloadButton = video.download
          ? `<a class="btn btn-download" href="${video.download}" target="_blank" rel="noopener noreferrer" download>Downloaden</a>`
          : `<span class="btn btn-disabled" aria-disabled="true">Geen download</span>`;

        return `
          <article class="card">
            <div class="thumb-wrap">
              <img
                class="thumb"
                src="https://img.youtube.com/vi/${video.youtubeId}/maxresdefault.jpg"
                alt="${escapeHtml(video.title)}"
                loading="lazy"
                onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='https://img.youtube.com/vi/${video.youtubeId}/hqdefault.jpg';}"
              />
              <div class="badge">${index + 1}</div>
            </div>

            <div class="content">
              <h2 class="title">${escapeHtml(video.title)}</h2>
              <div class="meta">${video.download ? 'Kijken op YouTube of downloaden via Drive' : 'Alleen beschikbaar via YouTube'}</div>
              <div class="actions">
                <a class="btn btn-watch" href="${video.youtube}" target="_blank" rel="noopener noreferrer">Bekijken</a>
                ${downloadButton}
              </div>
            </div>
          </article>
        `;
      }).join('');

      visibleCount.textContent = filtered.length;
      emptyState.style.display = filtered.length ? 'none' : 'block';
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    searchInput.addEventListener('input', (e) => render(e.target.value));
    render();
  </script>
